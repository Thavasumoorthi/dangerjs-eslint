name: DangerJS and ESLint POC

on:
  pull_request:
    branches:
      - master

jobs:
  danger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run DangerJS
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx danger ci
